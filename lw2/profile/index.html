<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Профиль</title>
        <link href="css/style.css" rel="stylesheet">
    </head>
    <body>
        <div class="icons-bar">
            <a href="/home/"><img class="icons-bar__icon" src="images/icons/home.svg" alt="Домой"></a>
            <a href="/profile/"><img class="icons-bar__icon" src="images/icons/profile.svg" alt="Профиль"></a>
            <a href="/create-post/"><img class="icons-bar__icon" src="images/icons/new-post.svg" alt="Создать пост"></a>
        </div>
        <div class="content">
            <img class="user-avatar" src="images/avatars/avatar1.jpg" alt="Аватарка">
            <p class="user-name">Ваня Денисов</p>
            <p class="user-status">Привет! Я системный аналитик в ACME :) Тут моя жизнь только для самых классных!</p>
            <div class="user-post-counter">
                <img class="user-post-counter__image" src="images/icons/post-counter.svg" alt="Счетчик постов">
                <span class="user-post-counter__text">43 поста</span>
            </div>
            <div class="user-posts">
                <img class="user-posts__image" src="images/posts/photo1.jpg" alt="Картинка из поста">
                <img class="user-posts__image" src="images/posts/photo2.jpg" alt="Картинка из поста">
                <img class="user-posts__image" src="images/posts/photo3.jpg" alt="Картинка из поста">
                <img class="user-posts__image" src="images/posts/photo4.jpg" alt="Картинка из поста">
                <img class="user-posts__image" src="images/posts/photo5.jpg" alt="Картинка из поста">
                <img class="user-posts__image" src="images/posts/photo6.jpg" alt="Картинка из поста">
            </div>
        </div>
    </body>
</html>
